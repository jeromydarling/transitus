<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Transitus</title>
    <script>
      // SPA redirect for GitHub Pages — preserves path for client-side router
      var repo = '/transitus';
      var l = window.location;
      var path = l.pathname.slice(repo.length);
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + repo + '/?p=' + encodeURIComponent(path) + l.search.replace('?', '&') + l.hash);
    </script>
  </head>
  <body></body>
</html>
